<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Roger — AI/ML Engineer">
  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c4cf1"/><stop offset="0.55" stop-color="#ff5d6c"/><stop offset="1" stop-color="#ff9524"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#131020"/>
  <!-- ambient colour blobs -->
  <circle cx="1050" cy="120" r="200" fill="#ff5d6c" opacity="0.55" filter="url(#blur)"/>
  <circle cx="1120" cy="480" r="170" fill="#6c4cf1" opacity="0.55" filter="url(#blur)"/>
  <circle cx="120" cy="560" r="150" fill="#12b3a3" opacity="0.45" filter="url(#blur)"/>
  <circle cx="250" cy="90" r="120" fill="#ffc93c" opacity="0.30" filter="url(#blur)"/>

  <!-- brand mark -->
  <g transform="translate(90,86) rotate(-6 34 34)">
    <rect width="68" height="68" rx="18" fill="url(#mark)"/>
    <text x="34" y="49" text-anchor="middle" font-family="'Trebuchet MS',Verdana,sans-serif" font-size="40" font-weight="800" fill="#fff">R</text>
  </g>

  <text x="92" y="272" font-family="'Courier New',monospace" font-size="26" letter-spacing="7" fill="#ff9524">AI / ML ENGINEER</text>

  <!-- headline -->
  <g font-family="'Trebuchet MS',Verdana,sans-serif" font-weight="800" fill="#f3efff">
    <text x="90" y="352" font-size="82">Machines that learn,</text>
    <text x="90" y="446" font-size="82">reason &amp; decide.</text>
  </g>
  <!-- spectrum accent bar -->
  <g>
    <rect x="92" y="486" width="64" height="10" rx="5" fill="#ff5d6c"/>
    <rect x="164" y="486" width="64" height="10" rx="5" fill="#ff9524"/>
    <rect x="236" y="486" width="64" height="10" rx="5" fill="#ffc93c"/>
    <rect x="308" y="486" width="64" height="10" rx="5" fill="#12b3a3"/>
    <rect x="380" y="486" width="64" height="10" rx="5" fill="#6c4cf1"/>
  </g>

  <text x="92" y="566" font-family="'Courier New',monospace" font-size="24" fill="#948bb0">rogertat.github.io/VSCode  ·  Chennai, India</text>
</svg>
