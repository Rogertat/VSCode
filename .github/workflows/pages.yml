# Publishes the site (repo root) to the gh-pages branch on every push to main.
# GitHub Pages serves the gh-pages branch. We push a clean snapshot (without
# the .github folder) rather than use the Pages API, because creating/updating
# the Pages site with GITHUB_TOKEN fails here with
# "Resource not accessible by integration".
name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish site snapshot to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-deploy
          rm -rf .github
          git add -A
          git commit -q -m "Deploy portfolio site"
          git push -f origin gh-pages-deploy:gh-pages
