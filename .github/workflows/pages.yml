# Deploys the portfolio/ folder to GitHub Pages on every push to main.
# configure-pages enablement:true creates the Pages site on first run,
# so no manual Settings -> Pages step is needed.
name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "portfolio/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enables the site on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
