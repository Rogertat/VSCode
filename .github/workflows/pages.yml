# Publishes the portfolio/ folder to the gh-pages branch on every push to
# main. GitHub Pages serves that branch (creating the gh-pages branch
# auto-enabled Pages, so no manual settings step was needed). The Pages API
# route (actions/configure-pages) was not usable here: creating the Pages
# site with GITHUB_TOKEN fails with "Resource not accessible by integration".
name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "portfolio/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for subtree split)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push portfolio/ to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SPLIT=$(git subtree split --prefix portfolio HEAD)
          git push -f origin "$SPLIT:refs/heads/gh-pages"
